<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | QS Golf Coordinators</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"><script type="module" src="js/includes.js"></script>
</head>
<body>
<div id="announcement-placeholder"></div><div id="nav-placeholder"></div>
<main>
  <div class="page-header"><div class="container"><h1>My Account</h1></div></div>
  <section class="section">
    <div class="container">
      <div class="account-layout">
        <nav class="account-nav">
          <button class="account-nav-btn active" data-panel="orders">📦 My Orders</button>
          <button class="account-nav-btn" data-panel="profile">👤 Profile</button>
          <button class="account-nav-btn" data-panel="addresses">📍 Addresses</button>
        </nav>
        <div>
          <div id="panel-orders">
            <h3 style="margin-bottom:24px">Order History</h3>
            <div style="background:var(--off-white);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px" id="ordersContent">
              <p style="color:var(--muted);font-size:14px;text-align:center;padding:24px 0">No orders yet. <a href="index.html" style="color:var(--green)">Start shopping →</a></p>
            </div>
          </div>
          <div id="panel-profile" style="display:none">
            <h3 style="margin-bottom:24px">Profile Details</h3>
            <div class="form-grid-2" style="max-width:560px">
              <div class="form-group"><label class="form-label">First name</label><input class="form-control" placeholder="First name"></div>
              <div class="form-group"><label class="form-label">Last name</label><input class="form-control" placeholder="Last name"></div>
            </div>
            <div class="form-group" style="max-width:560px"><label class="form-label">Email address</label><input class="form-control" type="email" placeholder="you@email.com"></div>
            <div class="form-group" style="max-width:560px"><label class="form-label">Phone</label><input class="form-control" type="tel" placeholder="071 000 0000"></div>
            <button class="btn btn--green" onclick="alert('Profile saved!')">Save Changes</button>
          </div>
          <div id="panel-addresses" style="display:none">
            <h3 style="margin-bottom:24px">Saved Addresses</h3>
            <p style="color:var(--muted);font-size:14px;margin-bottom:24px">No saved addresses yet.</p>
            <button class="btn btn--outline-green">+ Add New Address</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
<div id="footer-placeholder"></div>
<div class="whatsapp-float"><a href="https://wa.me/27000000000" target="_blank" rel="noopener">💬</a></div>
<script>
  document.querySelectorAll('.account-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.account-nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('[id^="panel-"]').forEach(p => p.style.display = 'none');
      document.getElementById('panel-' + btn.dataset.panel).style.display = 'block';
    });
  });

  const last = JSON.parse(sessionStorage.getItem('qs_last_order') || 'null');
  if (last) {
    document.getElementById('ordersContent').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)">
        <div><div style="font-weight:600;font-size:14px">Order #${last.num}</div><div style="font-size:12px;color:var(--muted)">Recently placed</div></div>
        <div style="font-weight:700;color:var(--green)">R${Number(last.total).toLocaleString('en-ZA')}</div>
        <span style="background:var(--green-tint);color:var(--green);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600">Processing</span>
      </div>`;
  }
</script>
</body></html>
