<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All Products | QS Golf Coordinators</title>
  <meta name="description" content="Browse all branded golf merchandise from QS Golf Coordinators. Apparel, drinkware, accessories and gift sets. Delivered nationwide across South Africa.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/includes.js"></script>
</head>
<body>
<div id="announcement-placeholder"></div>
<div id="nav-placeholder"></div>

<main>
  <div class="page-header">
    <div class="container">
      <h1>Shop All Products</h1>
      <p>Browse our full range of premium branded golf day merchandise.</p>
    </div>
  </div>

  <div class="filter-bar">
    <div class="container">
      <div class="filter-bar__inner">
        <select id="catFilter" style="border:1.5px solid var(--border-dark);border-radius:var(--r-md);padding:8px 14px;font-size:13px;background:var(--white)">
          <option value="">All Categories</option>
          <option value="Apparel">Apparel</option>
          <option value="Drinkware">Drinkware</option>
          <option value="Golf Accessories">Golf Accessories</option>
          <option value="Gift Sets">Gift Sets</option>
          <option value="Stationery &amp; Branding">Stationery &amp; Branding</option>
        </select>
        <select id="sortFilter" style="border:1.5px solid var(--border-dark);border-radius:var(--r-md);padding:8px 14px;font-size:13px;background:var(--white)">
          <option value="featured">Sort: Featured</option>
          <option value="low">Price: Low → High</option>
          <option value="high">Price: High → Low</option>
        </select>
        <span class="filter-bar__count" id="resultsCount"></span>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="product-grid" id="productGrid"></div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>
<div class="whatsapp-float">
  <a href="https://wa.me/27000000000?text=Hi%20QS%20Golf%20Coordinators!%20I%27m%20interested%20in..." target="_blank" rel="noopener" aria-label="WhatsApp">💬</a>
</div>

<script type="module">
  import { PRODUCTS, loadProducts } from './js/products.js';
  import { renderProductCard, showToast } from './js/utils.js';
  import { addToCart } from './js/cart.js';

  const grid = document.getElementById('productGrid');
  const count = document.getElementById('resultsCount');
  const catSel = document.getElementById('catFilter');
  const sortSel = document.getElementById('sortFilter');

  function render() {
    let list = [...PRODUCTS];
    const cat = catSel.value;
    const sort = sortSel.value;
    if (cat) list = list.filter(p => p.category === cat);
    if (sort === 'low')  list.sort((a,b) => a.price - b.price);
    if (sort === 'high') list.sort((a,b) => b.price - a.price);
    grid.innerHTML = list.map(renderProductCard).join('');
    count.textContent = `Showing ${list.length} product${list.length !== 1 ? 's' : ''}`;
  }

  catSel.addEventListener('change', render);
  sortSel.addEventListener('change', render);
  await loadProducts();
  render();

  document.addEventListener('click', e => {
    const btn = e.target.closest('.add-to-cart-btn');
    if (!btn) return;
    addToCart(btn.dataset.id);
    showToast('Added to cart!');
  });
</script>
</body>
</html>
